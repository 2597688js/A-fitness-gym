version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: a-fitness-gym-backend
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - JWT_SECRET=your_super_secret_jwt_key_here
      - RAZORPAY_KEY_ID=rzp_test_YOUR_KEY_ID
      - RAZORPAY_KEY_SECRET=YOUR_KEY_SECRET
    restart: unless-stopped
    networks:
      - gym-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5001/api/gallery', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: a-fitness-gym-frontend
    ports:
      - "5174:5174"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gym-network
    environment:
      - VITE_API_URL=http://backend:5001
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5174/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  gym-network:
    driver: bridge
