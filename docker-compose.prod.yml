version: '3.8'

services:
  backend:
    image: ${DOCKER_REGISTRY:-dockerhub.com}/${DOCKER_USERNAME:-yourusername}/a-fitness-gym-backend:${IMAGE_TAG:-latest}
    container_name: a-fitness-gym-backend
    ports:
      - "${BACKEND_PORT:-5001}:5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_here}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-rzp_test_YOUR_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-YOUR_KEY_SECRET}
    restart: unless-stopped
    networks:
      - gym-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5001/api/gallery"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ${DOCKER_REGISTRY:-dockerhub.com}/${DOCKER_USERNAME:-yourusername}/a-fitness-gym-frontend:${IMAGE_TAG:-latest}
    container_name: a-fitness-gym-frontend
    ports:
      - "${FRONTEND_PORT:-5174}:5174"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gym-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5174/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  gym-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
